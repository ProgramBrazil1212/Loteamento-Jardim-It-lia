<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Loteamento Jardim Itália</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>Loteamento Jardim Itália</h1>
            <p>Painel de Controle e Consulta de Lotes</p>
        </header>

        <div class="instrucoes">
            💡 <strong>Como usar:</strong> Clique em cima de qualquer uma das quadras no mapa abaixo para abrir a tabela de lotes.
        </div>

        <div class="mapa-container">
            <img src="planta.png" id="planta-imagem" alt="Mapa Loteamento Jardim Itália">
            
            <div id="camada-cliques">
                <div class="zona-lote" style="top: 11.2%; left: 46.2%; width: 7.2%; height: 8.8%;" onclick="abrirPainelQuadra('Q15')"></div>
                <div class="zona-lote" style="top: 11.2%; left: 55.2%; width: 7.2%; height: 8.8%;" onclick="abrirPainelQuadra('Q16')"></div>
                <div class="zona-lote" style="top: 11.2%; left: 64.2%; width: 7.2%; height: 8.8%;" onclick="abrirPainelQuadra('Q17')"></div>
                <div class="zona-lote" style="top: 11.2%; left: 73.2%; width: 7.2%; height: 8.8%;" onclick="abrirPainelQuadra('Q18')"></div>
                <div class="zona-lote" style="top: 11.2%; left: 82.2%; width: 7.2%; height: 8.8%;" onclick="abrirPainelQuadra('Q19')"></div>
                
                <div class="zona-lote" style="top: 21.5%; left: 46.2%; width: 11.5%; height: 8.8%;" onclick="abrirPainelQuadra('Q20')"></div>
                <div class="zona-lote" style="top: 21.5%; left: 59.8%; width: 9.2%; height: 8.8%;" onclick="abrirPainelQuadra('Q21')"></div>
                <div class="zona-lote" style="top: 21.5%; left: 70.8%; width: 9.2%; height: 8.8%;" onclick="abrirPainelQuadra('Q22')"></div>
                <div class="zona-lote" style="top: 21.5%; left: 82.2%; width: 9.2%; height: 8.8%;" onclick="abrirPainelQuadra('Q23')"></div>
                
                <div class="zona-lote" style="top: 30.5%; left: 46.2%; width: 8.2%; height: 8.8%;" onclick="abrirPainelQuadra('Q24')"></div>
                <div class="zona-lote" style="top: 30.5%; left: 56.5%; width: 7.5%; height: 8.8%;" onclick="abrirPainelQuadra('Q25')"></div>
                <div class="zona-lote" style="top: 30.5%; left: 66.2%; width: 9.2%; height: 8.8%;" onclick="abrirPainelQuadra('Q26')"></div>
                <div class="zona-lote" style="top: 30.5%; left: 77.5%; width: 14.0%; height: 8.8%;" onclick="abrirPainelQuadra('Q27')"></div>
                
                <div class="zona-lote" style="top: 40.0%; left: 62.0%; width: 9.2%; height: 8.8%;" onclick="abrirPainelQuadra('Q28')"></div>
            </div>
        </div>
    </div>

    <div id="modalLote" class="modal">
        <div class="modal-conteudo">
            <span class="fechar-btn" onclick="fecharModal()">&times;</span>
            <h2 id="modal-titulo-quadra">📋 Lotes</h2>
            <div class="linha-divisoria"></div>
            
            <div class="container-tabela">
                <table>
                    <thead>
                        <tr>
                            <th>Lote</th>
                            <th>Área (m²)</th>
                            <th>Proprietário</th>
                            <th>Contato</th>
                        </tr>
                    </thead>
                    <tbody id="lista-lotes-corpo">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
